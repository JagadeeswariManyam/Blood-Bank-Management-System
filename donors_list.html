{% extends "base.html" %}
{% block content %}
<h2>Donors List</h2>
<table class="table table-bordered table-striped">
    <thead class="table-danger">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Blood Group</th>
            <th>Contact</th>
            <th>Last Donation</th>
        </tr>
    </thead>
    <tbody>
        {% for donor in donors %}
        <tr>
            <td>{{ donor.donor_id }}</td>
            <td>{{ donor.name }}</td>
            <td>{{ donor.blood_group }}</td>
            <td>{{ donor.contact }}</td>
            <td>{{ donor.last_donation }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
